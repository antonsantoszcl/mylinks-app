<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background rounded square in primary-800 (#2A4A8C) -->
  <rect width="32" height="32" rx="7" fill="#2A4A8C"/>
  <!-- Globe icon (Lucide globe, white, scaled from 24px to fit in 32px with 4px padding) -->
